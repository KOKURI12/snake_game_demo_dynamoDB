# DynamoDB + ElastiCache Redis版
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  Snake Game — AWS 3層アーキテクチャ（DynamoDB + ElastiCache Redis版）
  プレゼンテーション: S3 + CloudFront
  アプリケーション:   API Gateway + Lambda（VPC内）
  データ:             DynamoDB + ElastiCache Redis
  ネットワーク:       VPC Interface/Gateway エンドポイント

# ============================================================
# パラメータ
# ============================================================
Parameters:
  ProjectName:
    Type: String
    Default: snake-game

  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id

  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id

  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id

  PrivateRouteTable1:
    Type: String
    Description: プライベートサブネット1のルートテーブルID（ap-northeast-1a）

  PrivateRouteTable2:
    Type: String
    Description: プライベートサブネット2のルートテーブルID（ap-northeast-1c）

# ============================================================
# 条件
# ============================================================
Conditions:
  IsProd: !Equals [!Ref Stage, prod]

# ============================================================
# グローバル設定
# ============================================================
Globals:
  Function:
    Runtime:       python3.12
    Timeout:       15
    MemorySize:    256
    Architectures: [arm64]
    VpcConfig:
      SecurityGroupIds: [!Ref LambdaSecurityGroup]
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
    Environment:
      Variables:
        TABLE_NAME:    !Ref ScoresTable
        ALLOW_ORIGIN:  !Sub 'https://${CloudFrontDistribution.DomainName}'
        REDIS_HOST:    !GetAtt RedisCluster.RedisEndpoint.Address
        REDIS_PORT:    '6379'
        CACHE_TTL:     '3600'
        GSI_NAME:      RankingIndex
        GSI_PK_NAME:   gsi_pk
        GSI_PK_VALUE:  ALL

# ============================================================
# リソース定義
# ============================================================
Resources:

  # ──────────────────────────────────────────────────────────
  # [プレゼンテーション層] S3 + CloudFront
  # ──────────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:                          !Sub '${ProjectName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior:               always
        SigningProtocol:               sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled:           true
        DefaultRootObject: index.html
        HttpVersion:       http2and3
        IPV6Enabled:       true
        PriceClass:        PriceClass_200
        Origins:
          - Id:         S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId:       S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId:        658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress:             true
        CustomErrorResponses:
          - ErrorCode:          403
            ResponseCode:       200
            ResponsePagePath:   /index.html
            ErrorCachingMinTTL: 0

  # ──────────────────────────────────────────────────────────
  # [アプリケーション層] API Gateway
  # ──────────────────────────────────────────────────────────
  SnakeApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${CloudFrontDistribution.DomainName}'
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [Content-Type]
        MaxAge: 86400

  # ──────────────────────────────────────────────────────────
  # [アプリケーション層] Lambda
  # ──────────────────────────────────────────────────────────
  PostScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-post-score-${Stage}'
      CodeUri:      ../backend/post_score/
      Handler:      lambda_function.lambda_handler
      Description:  スコア登録 API (POST /scores)
      Layers:
        - !Ref RedisPyLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScoresTable
      Events:
        PostScore:
          Type: HttpApi
          Properties:
            ApiId:  !Ref SnakeApi
            Path:   /scores
            Method: POST

  GetRankingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-get-ranking-${Stage}'
      CodeUri:      ../backend/get_ranking/
      Handler:      lambda_function.lambda_handler
      Description:  ランキング取得 API (GET /ranking)
      Layers:
        - !Ref RedisPyLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ScoresTable
      Events:
        GetRanking:
          Type: HttpApi
          Properties:
            ApiId:  !Ref SnakeApi
            Path:   /ranking
            Method: GET

  # ──────────────────────────────────────────────────────────
  # Lambda Layer — redis-py
  # ──────────────────────────────────────────────────────────
  RedisPyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName:               !Sub '${ProjectName}-redispy'
      Description:             redis-py for Python 3.12
      ContentUri:              ../backend/layer/
      CompatibleRuntimes:      [python3.12]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: python3.12

  # ──────────────────────────────────────────────────────────
  # [ネットワーク] セキュリティグループ
  # ──────────────────────────────────────────────────────────
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda functions SG
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-lambda-sg'

  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: VPC Interface Endpoints SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort:   443
          ToPort:     443
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpce-sg'

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort:   6379
          ToPort:     6379
          SourceSecurityGroupId: !Ref LambdaSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-redis-sg'

  # ──────────────────────────────────────────────────────────
  # [ネットワーク] VPC エンドポイント
  # ──────────────────────────────────────────────────────────
  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName:       !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcId:             !Ref VpcId
      VpcEndpointType:   Interface
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:  [!Ref VPCEndpointSecurityGroup]
      PrivateDnsEnabled: true

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName:     !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcId:           !Ref VpcId
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2

  DynamoDBEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName:     !Sub 'com.amazonaws.${AWS::Region}.dynamodb'
      VpcId:           !Ref VpcId
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2

  # ──────────────────────────────────────────────────────────
  # [データ層] DynamoDB
  # ──────────────────────────────────────────────────────────
  ScoresTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProd, Retain, Delete]
    Properties:
      TableName:   !Sub '${ProjectName}-scores-${Stage}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: player_name
          AttributeType: S
        - AttributeName: gsi_pk
          AttributeType: S
        - AttributeName: score
          AttributeType: N
      KeySchema:
        - AttributeName: player_name
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RankingIndex
          KeySchema:
            - AttributeName: gsi_pk
              KeyType: HASH
            - AttributeName: score
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: !If [IsProd, true, false]
      DeletionProtectionEnabled: !If [IsProd, true, false]
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Stage
          Value: !Ref Stage

  # ──────────────────────────────────────────────────────────
  # [データ層] ElastiCache Redis
  # ──────────────────────────────────────────────────────────
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${ProjectName}-redis-subnet-${Stage}-${AWS::AccountId}'
      Description:          !Sub '${ProjectName} Redis Subnet Group'
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      #ClusterName:          !Sub '${ProjectName}-redis-${Stage}' ClusterName省略 → CloudFormationが自動生成（20文字制限を回避）
      Engine:               redis
      EngineVersion:        '7.1'
      CacheNodeType:        cache.t4g.micro
      NumCacheNodes:        1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:  [!Ref RedisSecurityGroup]
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Stage
          Value: !Ref Stage

# ============================================================
# 出力
# ============================================================
Outputs:
  CloudFrontURL:
    Description: ゲームの公開 URL
    Value:        !Sub 'https://${CloudFrontDistribution.DomainName}'

  ApiEndpoint:
    Description: API Gateway エンドポイント
    Value:        !Sub 'https://${SnakeApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}'

  FrontendBucketName:
    Description: S3 バケット名
    Value:        !Ref FrontendBucket

  DynamoDBTableName:
    Description: DynamoDB テーブル名
    Value:        !Ref ScoresTable

  RedisEndpoint:
    Description: ElastiCache Redis エンドポイント
    Value:        !GetAtt RedisCluster.RedisEndpoint.Address